<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infacta</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="sky-background"></div>

  <header class="site-header">
    <button id="homeLogo" class="logo-button" aria-label="На головну">
      <img src="assets/logo/infacta-shield.png" alt="Infacta Logo" class="logo-image" />
      <span class="logo-text">Infacta</span>
    </button>
  </header>

  <main class="main-container">
    <section id="homeScreen" class="screen active">
      <div class="hero-card">
        <h1>Infacta</h1>
        <p class="hero-subtitle">Платформа аналізу інформації</p>

        <div class="menu-buttons">
          <button id="openContractsBtn" class="menu-btn primary-btn">Аналіз договорів</button>
          <button id="myDocsSoonBtn" class="menu-btn secondary-btn">Аналіз моїх документів (скоро)</button>
          <button id="newsSoonBtn" class="menu-btn secondary-btn">Аналіз новин (скоро)</button>
        </div>

        <div id="soonMessage" class="soon-message" aria-live="polite"></div>
      </div>
    </section>

    <section id="contractsScreen" class="screen">
      <div class="work-card">
        <h2>Аналіз договорів</h2>

        <label for="documentInput" class="input-label">Вставте текст договору:</label>
        <textarea
          id="documentInput"
          class="document-input"
          placeholder="Вставте тут текст договору для аналізу..."
        ></textarea>

        <div class="action-buttons">
          <button id="newDocumentBtn" class="menu-btn secondary-btn">Новий документ</button>
          <button id="analyzeBtn" class="menu-btn primary-btn">Аналізувати</button>
        </div>

        <div id="statusBox" class="status-box" aria-live="polite"></div>

        <div id="resultBox" class="result-box">
          <div class="result-placeholder">
            Результат аналізу з’явиться тут.
          </div>
        </div>
      </div>
    </section>
  </main>

  <button id="donateBtn" class="donate-widget" type="button">
    На розвиток сайту
  </button>

  <script type="module" src="js/app.js"></script>
</body>
</html>
