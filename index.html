<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infacta</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    .logo {
      font-size: 34px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 30px;
      cursor: pointer;
    }

    .menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
    }

    .btn {
      width: 320px;
      padding: 14px 18px;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #334155;
    }

    .btn-secondary {
      background: #475569;
    }

    .btn-secondary:hover {
      background: #64748b;
    }

    .hidden {
      display: none;
    }

    .workspace {
      margin-top: 25px;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 20px;
    }

    .workspace h2 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 22px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      box-sizing: border-box;
      resize: vertical;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #475569;
      background: #020617;
      color: white;
      font-size: 15px;
      line-height: 1.4;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 15px;
      margin-bottom: 18px;
    }

    .status {
      margin-top: 8px;
      margin-bottom: 14px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .result-box {
      margin-top: 10px;
      border: 1px solid #334155;
      border-radius: 12px;
      background: #020617;
      padding: 15px;
      max-height: 320px;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .soon {
      margin-top: 20px;
      text-align: center;
      color: #cbd5e1;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo" onclick="goHome()">🛡️ INFACTA</div>

    <div id="mainMenu" class="menu">
      <button class="btn" onclick="openContracts()">Аналіз договорів</button>
      <button class="btn" onclick="showSoon('Модуль аналізу моїх документів буде підключено пізніше.')">Мої документи (скоро)</button>
      <button class="btn" onclick="showSoon('Модуль аналізу новин буде підключено пізніше.')">Новини (скоро)</button>
    </div>

    <div id="soonBox" class="soon hidden"></div>

    <div id="contractWorkspace" class="workspace hidden">
      <h2>Аналіз договорів</h2>

      <textarea id="contractText" placeholder="Вставте текст договору сюди..."></textarea>

      <div class="actions">
        <button class="btn btn-secondary" onclick="resetDocument()">Новий документ</button>
        <button class="btn" onclick="analyzeContract()">Аналізувати</button>
      </div>

      <div id="status" class="status hidden"></div>

      <div id="resultBox" class="result-box hidden"></div>
    </div>
  </div>

  <script>
    function goHome() {
      document.getElementById("mainMenu").classList.remove("hidden");
      document.getElementById("contractWorkspace").classList.add("hidden");
      document.getElementById("soonBox").classList.add("hidden");
    }

    function openContracts() {
      document.getElementById("mainMenu").classList.add("hidden");
      document.getElementById("soonBox").classList.add("hidden");
      document.getElementById("contractWorkspace").classList.remove("hidden");
    }

    function showSoon(message) {
      document.getElementById("mainMenu").classList.remove("hidden");
      document.getElementById("contractWorkspace").classList.add("hidden");

      const box = document.getElementById("soonBox");
      box.textContent = message;
      box.classList.remove("hidden");
    }

    function resetDocument() {
      document.getElementById("contractText").value = "";
      document.getElementById("status").classList.add("hidden");
      document.getElementById("resultBox").classList.add("hidden");
      document.getElementById("resultBox").textContent = "";
    }

    async function analyzeContract() {
      const text = document.getElementById("contractText").value.trim();
      const status = document.getElementById("status");
      const resultBox = document.getElementById("resultBox");

      if (!text) {
        status.textContent = "Вставте текст договору для аналізу.";
        status.classList.remove("hidden");
        resultBox.classList.add("hidden");
        return;
      }

      status.textContent = "Аналіз триває...";
      status.classList.remove("hidden");
      resultBox.classList.add("hidden");
      resultBox.textContent = "";

      try {
        const response = await fetch("https://infacta.ai/api/analyze", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            text: text,
            mode: "contract_analysis",
            language: "uk"
          })
        });

        const data = await response.json();

        if (!response.ok) {
          status.textContent = "Помилка аналізу.";
          resultBox.textContent = JSON.stringify(data, null, 2);
          resultBox.classList.remove("hidden");
          return;
        }

        const result = data.result || {};
        const summary = result.summary || result.message || "Аналіз завершено.";
        const notes = Array.isArray(result.notes) ? result.notes.join("\n") : "";
        const questions = Array.isArray(result.questions) ? result.questions.join("\n") : "";

        let output = "";
        output += "Короткий висновок:\n" + summary + "\n\n";

        if (notes) {
          output += "Примітки:\n" + notes + "\n\n";
        }

        if (questions) {
          output += "Уточнюючі питання:\n" + questions + "\n";
        }

        status.textContent = "Аналіз завершено.";
        resultBox.textContent = output.trim();
        resultBox.classList.remove("hidden");
      } catch (error) {
        status.textContent = "Не вдалося з'єднатися з модулем аналізу.";
        resultBox.textContent = "Перевіримо підключення API на наступному кроці.";
        resultBox.classList.remove("hidden");
      }
    }
  </script>
</body>
</html>
