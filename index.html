<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Infacta</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #dbeeff, #f5fbff);
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .logo {
            cursor: pointer;
            margin-bottom: 20px;
        }

        .logo img {
            height: 90px;
        }

        .button {
            display: block;
            margin: 15px auto;
            padding: 12px 20px;
            width: 280px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            background-color: #2c5aa0;
            color: white;
        }

        .button:hover {
            background-color: #1e3d70;
        }

        .disabled {
            background-color: #ccc;
            color: red;
        }

        textarea {
            width: 80%;
            height: 150px;
            margin-top: 20px;
            padding: 10px;
            font-size: 14px;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: white;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
        }

        /* Донат блок */
        .donate {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #b6ff7a;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- ЛОГО -->
    <div class="logo" onclick="goHome()">
        <img src="infacta-logo-transparent.svg" alt="Infacta">
    </div>

    <!-- ГОЛОВНЕ МЕНЮ -->
    <div id="menu">
        <button class="button" onclick="openContracts()">Аналіз договорів</button>
        <button class="button disabled">Аналіз моїх документів (скоро)</button>
        <button class="button disabled">Аналіз новин (скоро)</button>
    </div>

    <!-- БЛОК АНАЛІЗУ -->
    <div id="contracts" style="display:none;">
        <textarea id="inputText" placeholder="Встав текст договору..."></textarea><br>

        <button class="button" onclick="newDoc()">Новий документ</button>
        <button class="button" onclick="analyze()">Аналізувати</button>

        <div class="result" id="result"></div>
    </div>

</div>

<!-- Донат -->
<div class="donate" onclick="donate()">
    На розвиток сайту
</div>

<script>

function goHome() {
    document.getElementById("menu").style.display = "block";
    document.getElementById("contracts").style.display = "none";
}

function openContracts() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("contracts").style.display = "block";
}

function newDoc() {
    document.getElementById("inputText").value = "";
    document.getElementById("result").innerHTML = "";
}

function analyze() {
    let text = document.getElementById("inputText").value;

    if (!text.trim()) {
        alert("Встав текст договору");
        return;
    }

    document.getElementById("result").innerHTML = `
        <b>Аналіз завершено.</b><br><br>
        Короткий висновок:<br>
        Інтерфейс працює стабільно.<br><br>
        Наступний крок:<br>
        Підключення ядра Infacta Core.
    `;
}

function donate() {
    alert("Реквізити скоро будуть додані");
}

</script>

</body>
</html>
