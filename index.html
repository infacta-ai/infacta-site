<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infacta</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.6) 0%, transparent 40%),
        radial-gradient(circle at 70% 20%, rgba(255,255,255,0.5) 0%, transparent 45%),
        radial-gradient(circle at 50% 70%, rgba(255,255,255,0.4) 0%, transparent 50%),
        linear-gradient(to bottom, #87cefa, #bfe9ff);
      color: white;
      min-height: 100vh;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px 100px;
    }

    .logo {
      font-size: 34px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 30px;
      cursor: pointer;
      user-select: none;
    }

    .menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
    }

    .btn {
      width: 320px;
      padding: 14px 18px;
      border: none;
      border-radius: 10px;
      background: #0f172a;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #1e293b;
    }

    .btn-secondary {
      background: #334155;
    }

    .btn-secondary:hover {
      background: #475569;
    }

    .hidden {
      display: none;
    }

    .workspace {
      margin-top: 25px;
      background: #0f172a;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    .workspace h2 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 22px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #020617;
      color: white;
      resize: vertical;
      font-size: 15px;
      line-height: 1.4;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 15px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .status {
      margin-top: 8px;
      margin-bottom: 14px;
      color: #e2e8f0;
    }

    .result-box {
      border-radius: 12px;
      background: #020617;
      padding: 15px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .soon {
      margin-top: 20px;
      text-align: center;
      color: #b91c1c;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 1px 2px rgba(255,255,255,0.35);
    }

    .donate-box {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #a3e635;
      color: #0f172a;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
      cursor: pointer;
      user-select: none;
      transition: 0.2s;
      z-index: 1000;
    }

    .donate-box:hover {
      background: #84cc16;
      transform: translateY(-1px);
    }

    .donate-message {
      position: fixed;
      right: 18px;
      bottom: 72px;
      max-width: 260px;
      background: rgba(15, 23, 42, 0.92);
      color: white;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.4;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
      z-index: 1000;
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="logo" onclick="goHome()">🛡️ INFACTA</div>

    <div id="mainMenu" class="menu">
      <button class="btn" onclick="openContracts()">Аналіз договорів</button>
      <button class="btn" onclick="showSoon('Аналіз моїх документів буде доступний пізніше')">Аналіз мої документи (скоро)</button>
      <button class="btn" onclick="showSoon('Аналіз новин буде доступний пізніше')">Аналіз новини (скоро)</button>
    </div>

    <div id="soonBox" class="soon hidden"></div>

    <div id="contractWorkspace" class="workspace hidden">
      <h2>Аналіз договорів</h2>

      <textarea id="contractText" placeholder="Вставте текст договору..."></textarea>

      <div class="actions">
        <button class="btn btn-secondary" onclick="resetDocument()">Новий документ</button>
        <button class="btn" onclick="analyzeContract()">Аналізувати</button>
      </div>

      <div id="status" class="status hidden"></div>

      <div id="resultBox" class="result-box hidden"></div>
    </div>

  </div>

  <div class="donate-box" onclick="toggleDonateMessage()">
    На розвиток сайту
  </div>

  <div id="donateMessage" class="donate-message hidden">
    Тут з часом будуть доступні реквізити для добровільної пожертви на розвиток сайту.
  </div>

  <script>
    window.onload = function() {
      goHome();
    };

    function goHome() {
      document.getElementById("mainMenu").classList.remove("hidden");
      document.getElementById("contractWorkspace").classList.add("hidden");
      document.getElementById("soonBox").classList.add("hidden");
      document.getElementById("donateMessage").classList.add("hidden");
    }

    function openContracts() {
      document.getElementById("mainMenu").classList.add("hidden");
      document.getElementById("soonBox").classList.add("hidden");
      document.getElementById("contractWorkspace").classList.remove("hidden");
      document.getElementById("donateMessage").classList.add("hidden");
    }

    function showSoon(message) {
      document.getElementById("mainMenu").classList.add("hidden");
      document.getElementById("contractWorkspace").classList.add("hidden");

      const box = document.getElementById("soonBox");
      box.textContent = message;
      box.classList.remove("hidden");

      document.getElementById("donateMessage").classList.add("hidden");
    }

    function resetDocument() {
      document.getElementById("contractText").value = "";
      document.getElementById("status").classList.add("hidden");
      document.getElementById("status").textContent = "";
      document.getElementById("resultBox").classList.add("hidden");
      document.getElementById("resultBox").textContent = "";
    }

    function toggleDonateMessage() {
      const box = document.getElementById("donateMessage");
      box.classList.toggle("hidden");
    }

    async function analyzeContract() {
      const text = document.getElementById("contractText").value.trim();
      const status = document.getElementById("status");
      const resultBox = document.getElementById("resultBox");

      if (!text) {
        status.textContent = "Вставте текст договору.";
        status.classList.remove("hidden");
        return;
      }

      status.textContent = "Аналіз триває...";
      status.classList.remove("hidden");

      resultBox.classList.remove("hidden");
      resultBox.textContent = "Обробка...";

      await new Promise(function(resolve) {
        setTimeout(resolve, 700);
      });

      resultBox.textContent =
        "Короткий висновок:\n" +
        "Інтерфейс працює стабільно.\n\n" +
        "Наступний крок:\n" +
        "Підключення ядра Infacta Core.";

      status.textContent = "Аналіз завершено.";
    }
  </script>

</body>
</html>
