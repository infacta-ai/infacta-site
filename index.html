<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Infacta</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(#cce6ff, #e6f2ff);
        }

        .header {
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        .menu {
            text-align: center;
            margin-top: 40px;
        }

        .menu button {
            display: block;
            margin: 10px auto;
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .container {
            display: none;
            text-align: center;
            margin-top: 30px;
        }

        textarea {
            width: 80%;
            height: 150px;
            margin-top: 20px;
        }

        .actions {
            margin-top: 15px;
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
        }

        .soon {
            color: red;
        }

        .donate {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: lightgreen;
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="header" onclick="goHome()">
    INFACTA
</div>

<div class="menu" id="menu">
    <button onclick="openModule('contract')">Аналіз договорів</button>
    <button class="soon">Аналіз мої документи (скоро)</button>
    <button class="soon">Аналіз новини (скоро)</button>
</div>

<div class="container" id="contract">
    <textarea placeholder="Встав текст договору..."></textarea>

    <div class="actions">
        <button onclick="newDoc()">Новий документ</button>
        <button onclick="analyze()">Аналізувати</button>
    </div>

    <div class="result" id="result"></div>
</div>

<div class="donate">
    На розвиток сайту
</div>

<script>
function openModule(id) {
    document.getElementById('menu').style.display = 'none';
    document.getElementById(id).style.display = 'block';
}

function goHome() {
    document.getElementById('menu').style.display = 'block';
    document.getElementById('contract').style.display = 'none';
}

function newDoc() {
    document.querySelector('textarea').value = '';
    document.getElementById('result').innerText = '';
}

function analyze() {
    document.getElementById('result').innerText = 'Аналіз завершено (демо)';
}
</script>

</body>
</html>
