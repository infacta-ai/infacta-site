<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infacta</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      
      /* НЕБО З ХМАРАМИ */
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.6) 0%, transparent 40%),
        radial-gradient(circle at 70% 20%, rgba(255,255,255,0.5) 0%, transparent 45%),
        radial-gradient(circle at 50% 70%, rgba(255,255,255,0.4) 0%, transparent 50%),
        linear-gradient(to bottom, #87cefa, #bfe9ff);

      color: white;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    .logo {
      font-size: 34px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 30px;
      cursor: pointer;
    }

    .menu {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
    }

    .btn {
      width: 320px;
      padding: 14px 18px;
      border: none;
      border-radius: 10px;
      background: #0f172a;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #1e293b;
    }

    .btn-secondary {
      background: #334155;
    }

    .hidden {
      display: none;
    }

    .workspace {
      margin-top: 25px;
      background: #0f172a;
      border-radius: 14px;
      padding: 20px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #020617;
      color: white;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 15px;
      margin-bottom: 18px;
    }

    .status {
      margin-top: 8px;
      margin-bottom: 14px;
      color: #e2e8f0;
    }

    .result-box {
      border-radius: 12px;
      background: #020617;
      padding: 15px;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .soon {
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="logo" onclick="goHome()">🛡️ INFACTA</div>

    <div id="mainMenu" class="menu">
      <button class="btn" onclick="openContracts()">Аналіз договорів</button>
      <button class="btn" onclick="showSoon('Аналіз моїх документів буде доступний пізніше')">Аналіз мої документи (скоро)</button>
      <button class="btn" onclick="showSoon('Аналіз новин буде доступний пізніше')">Аналіз новини (скоро)</button>
    </div>

    <div id="soonBox" class="soon hidden"></div>

    <div id="contractWorkspace" class="workspace hidden">
      <h2>Аналіз договорів</h2>

      <textarea id="contractText" placeholder="Вставте текст договору..."></textarea>

      <div class="actions">
        <button class="btn btn-secondary" onclick="resetDocument()">Новий документ</button>
        <button class="btn" onclick="analyzeContract()">Аналізувати</button>
      </div>

      <div id="status" class="status hidden"></div>

      <div id="resultBox" class="result-box hidden"></div>
    </div>

  </div>

  <script>
    window.onload = function() {
      goHome();
    };

    function goHome() {
      document.getElementById("mainMenu").classList.remove("hidden");
      document.getElementById("contractWorkspace").classList.add("hidden");
      document.getElementById("soonBox").classList.add("hidden");
    }

    function openContracts() {
      document.getElementById("mainMenu").classList.add("hidden");
      document.getElementById("soonBox").classList.add("hidden");
      document.getElementById("contractWorkspace").classList.remove("hidden");
    }

    function showSoon(message) {
      document.getElementById("mainMenu").classList.add("hidden");
      document.getElementById("contractWorkspace").classList.add("hidden");

      const box = document.getElementById("soonBox");
      box.textContent = message;
      box.classList.remove("hidden");
    }

    function resetDocument() {
      document.getElementById("contractText").value = "";
      document.getElementById("status").classList.add("hidden");
      document.getElementById("resultBox").classList.add("hidden");
    }

    async function analyzeContract() {
      const text = document.getElementById("contractText").value.trim();
      const status = document.getElementById("status");
      const resultBox = document.getElementById("resultBox");

      if (!text) {
        status.textContent = "Вставте текст договору.";
        status.classList.remove("hidden");
        return;
      }

      status.textContent = "Аналіз триває...";
      status.classList.remove("hidden");

      resultBox.classList.remove("hidden");
      resultBox.textContent = "Обробка...";

      await new Promise(r => setTimeout(r, 700));

      resultBox.textContent =
        "Короткий висновок:\n" +
        "Інтерфейс працює стабільно.\n\n" +
        "Наступний крок:\n" +
        "Підключення ядра Infacta Core.";

      status.textContent = "Аналіз завершено.";
    }
  </script>

</body>
</html>
